name: Contributor license agreement

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  acceptance:
    name: Check contributor CLA acceptance
    runs-on: ubuntu-latest
    steps:
      - name: Check contributor CLA acceptance
        # Comment events are noisy: only react to the signature statement and to
        # an explicit recheck request.
        if: >-
          github.event_name == 'pull_request_target' ||
          github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: https://github.com/nmrtist/plotx/blob/main/CONTRIBUTOR-LICENSE-AGREEMENT.md
          # Versioned path: publishing a new CLA version means pointing at a new
          # directory, which requires everyone to accept that version.
          path-to-signatures: signatures/version1/cla.json
          branch: cla-signatures
          allowlist: nmrtist,*[bot]
